<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="/src/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/src/constants.js"></script>
</head>
<body>

    <div id="proj-root">
        <div id="proj-selector">
            <span id="proj-selector-name"></span>
            <span id="proj-arrow">&#9660;</span>
        </div>
        <div id="proj-list-wrap">
            <div id="proj-list"></div>
            <div id="proj-add-area">
                <button id="proj-add-btn">+ Добавить</button>
                <div id="proj-add-input-row">
                    <input id="proj-add-input" type="text" placeholder="Название проекта" autocomplete="off">
                    <div class="proj-confirm-btn" id="proj-add-confirm" title="Добавить"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><line x1="4.5" y1="0.5" x2="4.5" y2="8.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="0.5" y1="4.5" x2="8.5" y2="4.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
                </div>
            </div>
        </div>
    </div>
    <div id="proj-drag-ghost"></div>

    <div id="search-root">
        <div id="search-bar">
            <span id="search-icon">&#8981;</span>
            <input id="search-input" type="text" placeholder="Поиск по заметкам..." autocomplete="off">
            <span id="search-clear">&#215;</span>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="canvas"></div>
    <button id="add-image-btn" title="Добавить изображение"></button>
    <button id="add-btn">+</button>
    <input id="image-file-input" type="file" accept="image/*" style="display:none">

    <script src="/src/main.js" defer></script>
</body>
</html>
